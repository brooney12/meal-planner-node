name: PR Test Scenarios

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  suggest-tests:
    name: Suggest Test Scenarios
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      models: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          # Limit diff size to avoid exceeding token limits
          DIFF=$(git diff origin/main...HEAD -- '*.ts' '*.tsx' | head -c 12000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate test scenarios
        id: scenarios
        uses: actions/github-script@v7
        env:
          DIFF: ${{ steps.diff.outputs.diff }}
        with:
          script: |
            const diff = process.env.DIFF;
            if (!diff || diff.trim().length === 0) {
              core.setOutput('comment', '> No TypeScript changes detected in this PR.');
              return;
            }

            const response = await fetch('https://models.inference.ai.azure.com/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
              },
              body: JSON.stringify({
                model: 'gpt-4o-mini',
                messages: [
                  {
                    role: 'system',
                    content: `You are a QA engineer reviewing a TypeScript/React pull request for a meal planner app (Node.js + Express backend, React frontend, SQLite, JWT auth).
            Analyze the diff and output a concise markdown list of test scenarios that should be written or verified for this change.
            Group them under: ### Unit Tests, ### Integration Tests, ### Edge Cases.
            Be specific to the actual code changed. Keep it under 40 bullet points total.`,
                  },
                  {
                    role: 'user',
                    content: `Here is the PR diff:\n\`\`\`diff\n${diff}\n\`\`\``,
                  },
                ],
                max_tokens: 1024,
                temperature: 0.3,
              }),
            });

            if (!response.ok) {
              const err = await response.text();
              core.warning(`GitHub Models API error: ${err}`);
              core.setOutput('comment', '> ⚠️ Could not generate test scenarios — GitHub Models API unavailable.');
              return;
            }

            const data = await response.json();
            const content = data.choices?.[0]?.message?.content ?? 'No suggestions returned.';
            core.setOutput('comment', content);

      - name: Post PR comment
        uses: actions/github-script@v7
        env:
          SCENARIOS: ${{ steps.scenarios.outputs.comment }}
        with:
          script: |
            const body = `## 🧪 Suggested Test Scenarios\n\n${process.env.SCENARIOS}\n\n---\n*Generated by PR Test Scenarios workflow — review and add relevant tests before merging.*`;

            // Find and update existing bot comment if present, otherwise create one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user?.type === 'Bot' && c.body?.startsWith('## 🧪 Suggested Test Scenarios')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
