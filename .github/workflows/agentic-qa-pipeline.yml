# .github/workflows/agentic-qa-pipeline.yml
#
# Agentic QA Pipeline
#
# Stages:
#   1. On PR open/update → AI-powered AC check via GitHub Models + post test plan
#   2. On "approved" comment from maintainer → agent writes and runs Playwright tests
#   3. Coverage gate blocks merge if tests fail
#
# Required secrets:
#   GITHUB_TOKEN   Provided automatically by Actions — no setup needed
#
# Required repo settings:
#   - Copilot code review enabled (Settings → Code and Automation → Copilot)
#   - Copilot plan with GitHub Models access
#   - Branch protection on main: require status checks "issue-ac-check" and "playwright-tests"

name: Agentic QA Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  models: read

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1: GitHub Issue AC check (AI-powered via GitHub Models)
  # Runs on every PR open/update.
  # Fetches the linked GitHub Issue, extracts acceptance criteria,
  # diffs them against the PR changes using GitHub Models (gpt-4o),
  # and posts a fully auto-checked coverage report as a PR comment.
  # Fails the check if any ACs are missing — blocks merge.
  #
  # No extra secrets needed — uses GITHUB_TOKEN throughout.
  # Requires: GitHub Copilot plan with access to GitHub Models.
  # ─────────────────────────────────────────────────────────────
  issue-ac-check:
    name: GitHub Issue AC check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      issues: write
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract issue number from branch name
        id: issue
        run: |
          BRANCH="${{ github.head_ref }}"
          NUMBER=$(echo "$BRANCH" | grep -oE '/[0-9]+' | grep -oE '[0-9]+' | head -1)
          if [ -z "$NUMBER" ]; then
            echo "No issue number found in branch name: $BRANCH"
            echo "number=" >> $GITHUB_OUTPUT
          else
            echo "Found issue number: $NUMBER"
            echo "number=$NUMBER" >> $GITHUB_OUTPUT
          fi

      - name: Fetch issue and PR diff
        id: fetch
        if: steps.issue.outputs.number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Fetch the linked GitHub Issue
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ steps.issue.outputs.number }}'),
            });

            // Fetch the PR diff — limited to 8k chars to stay within model context
            const { data: diff } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              mediaType: { format: 'diff' },
            });

            const diffText = typeof diff === 'string'
              ? diff.slice(0, 8000)
              : JSON.stringify(diff).slice(0, 8000);

            core.setOutput('issue_number', issue.number);
            core.setOutput('issue_title', issue.title);
            core.setOutput('issue_url', issue.html_url);
            core.setOutput('issue_body', (issue.body || '').slice(0, 4000));
            core.setOutput('pr_diff', diffText);

      - name: Write AI prompt file
        if: steps.issue.outputs.number != ''
        env:
          ISSUE_BODY: ${{ steps.fetch.outputs.issue_body }}
          PR_DIFF: ${{ steps.fetch.outputs.pr_diff }}
        run: |
          {
            echo "You are a QA engineer reviewing a pull request against a GitHub Issue."
            echo ""
            echo "## Your task"
            echo "1. Extract every acceptance criterion (AC) from the issue body below."
            echo "   Look for bullet points, numbered lists, checkboxes (- [ ]), or any"
            echo "   sentence that describes expected behaviour."
            echo "2. For each AC, decide: COVERED, PARTIAL, or MISSING — based solely"
            echo "   on what you can see in the diff."
            echo "3. Return ONLY a JSON array. No explanation, no markdown fences."
            echo ""
            echo "Schema:"
            echo '[{ "ac": "<AC text>", "status": "COVERED|PARTIAL|MISSING", "reason": "<one sentence>" }]'
            echo ""
            echo "If no ACs are found, return:"
            echo '[{"ac": "No acceptance criteria found", "status": "MISSING", "reason": "Add AC to the GitHub Issue."}]'
            echo ""
            echo "## GitHub Issue body"
            echo "$ISSUE_BODY"
            echo ""
            echo "## PR diff (truncated)"
            echo "$PR_DIFF"
          } > /tmp/ac-prompt.txt

      - name: Analyse AC coverage with GitHub Models
        id: ai-check
        if: steps.issue.outputs.number != ''
        uses: actions/ai-inference@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          prompt-file: /tmp/ac-prompt.txt
          model: openai/gpt-4o
          max-tokens: 1500

      - name: Parse AC results
        id: parse-results
        if: steps.issue.outputs.number != ''
        uses: actions/github-script@v7
        env:
          RAW_RESPONSE: ${{ steps.ai-check.outputs.response }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const raw = process.env.RAW_RESPONSE || '[]';

            // Strip accidental markdown fences before parsing
            const cleaned = raw.replace(/```json|```/g, '').trim();
            let results = [];
            try {
              results = JSON.parse(cleaned);
            } catch(e) {
              core.warning('Could not parse model response: ' + cleaned);
              results = [{
                ac: 'AC analysis failed — model returned unexpected output',
                status: 'MISSING',
                reason: 'Check the Actions log for the raw model response.',
              }];
            }
            core.setOutput('results', JSON.stringify(results));
            console.log('AC analysis:', JSON.stringify(results, null, 2));

      - name: Post AC coverage report as PR comment
        if: steps.issue.outputs.number != ''
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.fetch.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.fetch.outputs.issue_title }}
          ISSUE_URL: ${{ steps.fetch.outputs.issue_url }}
          AC_RESULTS: ${{ steps.parse-results.outputs.results }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = process.env.ISSUE_NUMBER;
            const issueTitle  = process.env.ISSUE_TITLE;
            const issueUrl    = process.env.ISSUE_URL;
            const prNumber    = context.payload.pull_request.number;

            let results = [];
            try {
              results = JSON.parse(process.env.AC_RESULTS || '[]');
            } catch(e) { results = []; }

            const icon = s =>
              s === 'COVERED' ? '✅' : s === 'PARTIAL' ? '⚠️' : '❌';

            const covered = results.filter(r => r.status === 'COVERED').length;
            const partial = results.filter(r => r.status === 'PARTIAL').length;
            const missing = results.filter(r => r.status === 'MISSING').length;
            const total   = results.length;

            const summary = total === 0
              ? '⚠️ No acceptance criteria found in the issue.'
              : missing === 0 && partial === 0
                ? `✅ All ${total} acceptance criteria covered.`
                : `${covered}/${total} covered · ${partial} partial · ${missing} missing`;

            const rows = results.map(r =>
              `| ${icon(r.status)} **${r.status}** | ${r.ac} | ${r.reason} |`
            ).join('\n');

            const body = [
              `## 📋 AC coverage — [#${issueNumber}: ${issueTitle}](${issueUrl})`,
              '',
              `**${summary}**`,
              '',
              '| Status | Acceptance criterion | Reasoning |',
              '|--------|----------------------|-----------|',
              rows,
              '',
              '> _Analysed automatically using GitHub Models (gpt-4o)._',
              '> _Review the reasoning above before approving the test plan._',
              '',
              '---',
              `_[View issue #${issueNumber}](${issueUrl})_`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

            // Fail the check if any ACs are missing — this blocks merge
            // when issue-ac-check is added as a required status check.
            if (missing > 0) {
              core.setFailed(
                `${missing} acceptance criteri${missing === 1 ? 'on' : 'a'} not covered by this PR.`
              );
            }

      - name: No issue number found — warn
        if: steps.issue.outputs.number == ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '## ⚠️ No GitHub Issue found',
                '',
                'No issue number was detected in the branch name.',
                'Expected format: `copilot/123-short-description`',
                '',
                'Issue AC check skipped.',
              ].join('\n'),
            });


  # ─────────────────────────────────────────────────────────────
  # JOB 2: Post AI-generated test plan
  # Runs on every PR open/update.
  # Fetches the linked GitHub Issue and the PR diff, then uses
  # GitHub Models (gpt-4o) to generate a concrete, scenario-specific
  # test plan comparing the PR changes to the issue requirements.
  # Posts the plan as a PR comment and waits for human approval.
  # ─────────────────────────────────────────────────────────────
  post-test-plan:
    name: Post test plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: issue-ac-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed test-relevant files
        id: changed
        run: |
          FILES=$(git diff origin/${{ github.base_ref }}...HEAD --name-only -- '*.ts' '*.tsx' | grep -v '\.spec\.' | grep -v '/tests/' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Changed source files: $FILES"

      - name: Extract issue number from branch name
        id: issue
        run: |
          BRANCH="${{ github.head_ref }}"
          NUMBER=$(echo "$BRANCH" | grep -oE '/[0-9]+' | grep -oE '[0-9]+' | head -1)
          echo "number=${NUMBER:-}" >> $GITHUB_OUTPUT

      - name: Fetch issue body and PR diff
        id: fetch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = '${{ steps.issue.outputs.number }}';

            let issueTitle = '';
            let issueBody = '';
            let issueUrl = '';

            if (issueNumber) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: parseInt(issueNumber),
                });
                issueTitle = issue.title;
                issueBody = (issue.body || '').slice(0, 4000);
                issueUrl = issue.html_url;
              } catch(e) {
                console.log('Could not fetch issue:', e.message);
              }
            }

            // Fetch the PR diff — limited to 8k chars to stay within model context
            const { data: diff } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              mediaType: { format: 'diff' },
            });

            const diffText = typeof diff === 'string'
              ? diff.slice(0, 8000)
              : JSON.stringify(diff).slice(0, 8000);

            core.setOutput('issue_title', issueTitle);
            core.setOutput('issue_body', issueBody);
            core.setOutput('issue_url', issueUrl);
            core.setOutput('pr_diff', diffText);

      - name: Build test plan prompt
        env:
          ISSUE_TITLE: ${{ steps.fetch.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.fetch.outputs.issue_body }}
          PR_DIFF: ${{ steps.fetch.outputs.pr_diff }}
        run: |
          {
            echo "You are a QA engineer writing a test plan for a pull request on a meal planner app"
            echo "(Node.js + Express backend, React frontend, SQLite, JWT auth, Vitest unit tests, Playwright E2E)."
            echo ""
            echo "## Your task"
            echo "Compare the PR diff to the GitHub Issue requirements and produce a concrete, scenario-specific"
            echo "test plan. Each scenario must be specific to the actual code changed — no generic placeholders."
            echo ""
            echo "Return ONLY a markdown document with these sections (no preamble, no explanation):"
            echo ""
            echo "### Unit Tests"
            echo "- [ ] **<short name>**: given <precondition>, when <action>, then <expected result>"
            echo ""
            echo "### Integration Tests"
            echo "- [ ] **<short name>**: given <precondition>, when <action>, then <expected result>"
            echo ""
            echo "### E2E / Happy-path tests"
            echo "- [ ] **<short name>**: given <precondition>, when <action>, then <expected result>"
            echo ""
            echo "### Error / Edge cases"
            echo "- [ ] **<short name>**: given <precondition>, when <action>, then <expected result>"
            echo ""
            echo "### Out of scope"
            echo "- <reason why it is explicitly excluded>"
            echo ""
            echo "Rules:"
            echo "- Maximum 40 bullet points total across all sections."
            echo "- Each bullet must reference the specific function, route, component, or behaviour changed."
            echo "- If the issue has no requirements, base the plan entirely on the diff."
            echo ""
            echo "## GitHub Issue: $ISSUE_TITLE"
            echo "$ISSUE_BODY"
            echo ""
            echo "## PR diff (truncated to 8 k)"
            echo "$PR_DIFF"
          } > /tmp/test-plan-prompt.txt

      - name: Generate test plan with GitHub Models
        id: ai-plan
        uses: actions/ai-inference@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          model: openai/gpt-4o
          prompt-file: /tmp/test-plan-prompt.txt

      - name: Post AI-generated test plan as PR comment
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.fetch.outputs.issue_title }}
          ISSUE_URL: ${{ steps.fetch.outputs.issue_url }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
          AI_PLAN: ${{ steps.ai-plan.outputs.response }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const issueNumber = process.env.ISSUE_NUMBER;
            const issueTitle = process.env.ISSUE_TITLE;
            const issueUrl = process.env.ISSUE_URL;
            const changedFiles = (process.env.CHANGED_FILES || '').trim();
            const aiPlan = (process.env.AI_PLAN || '').trim() ||
              '> ⚠️ AI model did not return a test plan. Review the diff manually.';

            const fileList = changedFiles
              ? changedFiles.split(' ').filter(Boolean).map(f => `- \`${f}\``).join('\n')
              : '- _(no source files changed)_';

            const issueRef = issueNumber
              ? `[#${issueNumber}: ${issueTitle}](${issueUrl})`
              : 'N/A (no issue number found in branch name)';

            const body = [
              '## 🧪 Test Plan (awaiting approval)',
              '',
              `**GitHub issue**: ${issueRef}`,
              `**PR**: #${prNumber}`,
              `**Changed source files**:`,
              fileList,
              '',
              '---',
              '',
              aiPlan,
              '',
              '---',
              '',
              '> _Generated automatically by comparing PR changes to the linked GitHub Issue using GitHub Models (gpt-4o)._',
              '> _Review the scenarios above for accuracy before approving._',
              '',
              '**To approve this plan and trigger test writing, reply with:**',
              '```',
              'approved',
              '```',
              '',
              '**To request changes, reply with your feedback.**',
              '',
              '> ⚠️ No test code will be written until this plan is approved by a maintainer.',
            ].join('\n');

            // Update existing test-plan comment if present, otherwise create one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c =>
              c.user?.type === 'Bot' && c.body?.startsWith('## 🧪 Test Plan')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['test-plan-pending'],
              });
            } catch(e) {
              console.log('Could not add label (may not exist yet):', e.message);
            }


  # ─────────────────────────────────────────────────────────────
  # JOB 3: Write and run Playwright tests
  # Triggered ONLY when a maintainer comments "approved" on a PR.
  # Checks that the commenter has write access before proceeding.
  # ─────────────────────────────────────────────────────────────
  write-and-run-tests:
    name: Write and run Playwright tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, 'approved')

    steps:
      - name: Verify commenter has write access
        id: auth-check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            const level = perm.permission;
            const allowed = ['admin', 'write'].includes(level);
            console.log(`${context.actor} has permission: ${level} — allowed: ${allowed}`);
            if (!allowed) {
              core.setFailed(`${context.actor} does not have write access. Test plan must be approved by a maintainer.`);
            }
            return allowed;

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number,
            });
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('number', pr.number);
            return pr;

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Acknowledge and start
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body: [
                '## ✅ Test plan approved — writing tests now',
                '',
                `Approved by @${context.actor}`,
                '',
                'The agent is now:',
                '1. Analyzing the approved test plan',
                '2. Writing Playwright tests following the plan',
                '3. Running tests and self-healing any failures',
                '4. Committing passing tests to this branch',
                '',
                '_This comment will be updated when tests are complete._',
              ].join('\n'),
            });

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ steps.pr.outputs.number }},
                name: 'test-plan-pending',
              });
            } catch(e) { /* label may not exist */ }

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ steps.pr.outputs.number }},
                labels: ['tests-in-progress'],
              });
            } catch(e) { console.log('Could not add label:', e.message); }

      - name: Run Playwright tests
        id: playwright
        run: |
          npx playwright test --reporter=json,html 2>&1 | tee /tmp/playwright-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-pr-${{ steps.pr.outputs.number }}
          path: playwright-report/
          retention-days: 14

      - name: Parse test results
        id: results
        run: |
          OUTPUT=$(cat /tmp/playwright-output.txt)
          PASSED=$(echo "$OUTPUT" | grep -oE '[0-9]+ passed' | grep -oE '[0-9]+' | tail -1 || echo "0")
          FAILED=$(echo "$OUTPUT" | grep -oE '[0-9]+ failed' | grep -oE '[0-9]+' | tail -1 || echo "0")
          SKIPPED=$(echo "$OUTPUT" | grep -oE '[0-9]+ skipped' | grep -oE '[0-9]+' | tail -1 || echo "0")
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT

      - name: Post test results to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const passed = '${{ steps.results.outputs.passed }}';
            const failed = '${{ steps.results.outputs.failed }}';
            const skipped = '${{ steps.results.outputs.skipped }}';
            const exitCode = '${{ steps.playwright.outputs.exit_code }}';
            const prNumber = ${{ steps.pr.outputs.number }};
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const emoji = exitCode === '0' ? '✅' : '❌';
            const status = exitCode === '0' ? 'All tests passed' : 'Some tests failed';

            const body = [
              `## ${emoji} Playwright test results`,
              '',
              `| Result | Count |`,
              `|--------|-------|`,
              `| ✅ Passed | ${passed} |`,
              `| ❌ Failed | ${failed} |`,
              `| ⏭️ Skipped | ${skipped} |`,
              '',
              `**Status**: ${status}`,
              '',
              `[View full report](${runUrl}) · Artifact: \`playwright-report-pr-${prNumber}\``,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

            const labelToRemove = 'tests-in-progress';
            const labelToAdd = exitCode === '0' ? 'tests-passing' : 'tests-failing';

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: labelToRemove,
              });
            } catch(e) { /* label may not exist */ }

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: [labelToAdd],
              });
            } catch(e) { console.log('Could not add label:', e.message); }

      - name: Fail job if tests failed
        if: steps.playwright.outputs.exit_code != '0'
        run: |
          echo "Playwright tests failed. See report in Actions artifacts."
          exit 1


  # ─────────────────────────────────────────────────────────────
  # JOB 4: Coverage gate (required status check)
  # Blocks merge if Playwright tests are not passing.
  # Add "playwright-tests" as a required check in branch protection.
  # ─────────────────────────────────────────────────────────────
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-gate
          path: playwright-report/
          retention-days: 7
